version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sql-playground-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: playground1234
      MYSQL_DATABASE: sql_playground
      MYSQL_USER: playground
      MYSQL_PASSWORD: playground1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pplayground1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sql-playground-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: playground
      DB_PASSWORD: playground1234
      DB_NAME: sql_playground
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sql-playground-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
